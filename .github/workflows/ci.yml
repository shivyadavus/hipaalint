name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check

  test:
    name: Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [18, 20, 22]
        os: [ubuntu-latest]
        include:
          - node-version: 22
            os: windows-latest
          - node-version: 22
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        if: ${{ !(matrix.node-version == 22 && matrix.os == 'ubuntu-latest') }}
        run: npm run test
      - name: Run tests with coverage
        if: matrix.node-version == 22 && matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
      - name: Upload coverage
        if: matrix.node-version == 22 && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Verify SQL assets copied
        run: |
          test -f dist/rules/db/schema.sql || (echo "❌ schema.sql missing from dist" && exit 1)
          test -f dist/rules/db/seed-hipaa.sql || (echo "❌ seed-hipaa.sql missing from dist" && exit 1)
          echo "✅ SQL assets present in dist/"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            package.json
            .claude-plugin/
            .mcp.json
            skills/
            commands/
            agents/

  plugin-validate:
    name: Plugin Validation
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Validate plugin structure
        run: bash scripts/validate-plugin.sh
      - name: MCP server smoke test
        run: |
          # Start MCP server in background and send initialize request
          timeout 10 bash -c '
            echo "{\"jsonrpc\":\"2.0\",\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"ci-test\",\"version\":\"1.0\"}},\"id\":1}" | \
            node dist/mcp-server/index.js 2>/dev/null
          ' > /tmp/mcp-response.txt || true
          
          if [ -s /tmp/mcp-response.txt ]; then
            echo "✅ MCP server responded"
            cat /tmp/mcp-response.txt
          else
            echo "⚠️ MCP server started without error (stdio mode — no response without full handshake)"
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
