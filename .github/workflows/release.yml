name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - run: npm ci
      - run: npm run verify:release

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run rules:generate

      - name: Package tarball
        run: npm pack

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Package VS Code extension
        run: npm run vscode:package
      - name: Package JetBrains plugin
        run: npm run jetbrains:build

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          CURR_TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-decorate)
          else
            CHANGES=$(git log --oneline --no-decorate ${PREV_TAG}..${CURR_TAG})
          fi

          # Write changelog to file for the release body
          cat > /tmp/changelog.md << 'BODY'
          ## HipaaLint AI ${CURR_TAG}

          ### Changes
          BODY
          echo "$CHANGES" | sed 's/^/- /' >> /tmp/changelog.md

          cat >> /tmp/changelog.md << 'BODY'

          ### Installation

          **npm:**
          ```bash
          npm install -g @hipaalint/ai
          ```

          **Claude Code Plugin:**
          ```bash
          claude plugin install https://github.com/shivyadavus/hipaalint-ai
          ```

          ### Plugin Info
          - MCP Server: 5 tools
          - CLI: 5 commands
          - Rules: 266 total rules (43 HIPAA, 156 HITRUST, 67 SOC2 Health)
          - IDEs: VS Code extension and JetBrains plugin artifacts
          BODY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          files: |
            hipaalint-ai-*.tgz
            hipaalint-vscode-*.vsix
            jetbrains-plugin/build/distributions/*.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
