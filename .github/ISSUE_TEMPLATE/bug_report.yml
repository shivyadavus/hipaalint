name: Bug Report
description: Report a bug in HipaaLint
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

        Do not include PHI, production credentials, access tokens, private keys, patient records, or other sensitive data in this public issue.
        If the report involves sensitive security information, use the private process in `SECURITY.md` instead of filing a public issue.

  - type: checkboxes
    id: no-sensitive-data
    attributes:
      label: Sensitive Data Check
      options:
        - label: I confirm this issue does not include PHI, secrets, or other sensitive production data.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `hipaalint scan ./my-project`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Redact logs, file contents, screenshots, and output before posting.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: HipaaLint Version
      description: Run `hipaalint --version` to find this.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Run `node --version` to find this.
      placeholder: "v18.20.0"
    validations:
      required: true

  - type: dropdown
    id: usage
    attributes:
      label: Usage Context
      description: How are you using HipaaLint?
      options:
        - CLI
        - MCP Server (Claude Code / Cursor)
        - GitHub Action
        - Node.js API
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output. Redact PHI, secrets, and customer data before posting.
