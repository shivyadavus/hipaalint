name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

        Do not include PHI, production credentials, access tokens, private keys, patient records, or other sensitive data in this public issue.

  - type: checkboxes
    id: no-sensitive-data
    attributes:
      label: Sensitive Data Check
      options:
        - label: I confirm this request does not include PHI, secrets, or other sensitive production data.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of HipaaLint does this relate to?
      options:
        - PHI Detection
        - Rule Engine
        - Scoring
        - Auto-Fix
        - CLI
        - MCP Server
        - Reports (JSON/PDF/SARIF)
        - GitHub Action
        - New Rule
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples. Redact PHI, secrets, and customer data before posting.
