plugins {
  id 'java'
  id 'org.jetbrains.intellij' version '1.17.4'
}

group = 'com.hipaalint'
version = '1.0.0'

repositories {
  mavenCentral()
}

dependencies {
  implementation 'com.google.code.gson:gson:2.11.0'
}

java {
  sourceCompatibility = JavaVersion.VERSION_17
  targetCompatibility = JavaVersion.VERSION_17
}

intellij {
  version = '2024.1.7'
  type = 'IC'
  plugins = ['com.intellij.java']
}

patchPluginXml {
  sinceBuild = '241'
  untilBuild = '251.*'
  changeNotes = 'Functional HipaaLint inspection provider with quick fixes, dashboard, and workspace settings.'
}

tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
  options.release = 17
}
